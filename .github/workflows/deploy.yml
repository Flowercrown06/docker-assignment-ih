name: Deploy
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~
            if [ ! -d "app" ]; then
              git clone https://github.com/Flowercrown06/docker-assignment-ih.git app
            fi
            cd app
            git pull origin main
            sudo docker-compose down
            sudo docker-compose up -d --build
